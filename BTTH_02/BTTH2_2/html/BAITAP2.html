<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập 02</title>
    <link rel="stylesheet" href="/BTTH2_2/css/BAITAP2.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">TRAVEL GOALS</div>
      <nav>
        <a href="#">Destinations</a>
        <a href="#">About</a>
      </nav>
    </header>

    <!-- MAIN -->
    <main>
      <!-- HERO -->
      <section class="hero">
        <div class="hero-content">
          <h1>JOE'S TRAVEL PAGE</h1>
          <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
          <button>Discover places</button>
        </div>
      </section>

      <!-- HIGHLIGHTS -->
      <section class="highlights">
        <h2>HIGHLIGHTS</h2>

        <div class="cards">
          <div class="card">
            <img src="/BTTH2_2/images/miami.jpg" alt="Miami" />
            <p>MIAMI <span>USA</span></p>
          </div>

          <div class="card">
            <img src="/BTTH2_2/images/munich.jpg" alt="Munich" />
            <p>MUNICH <span>GERMANY</span></p>
          </div>

          <div class="card">
            <img src="/BTTH2_2/images/barcelona.jpg" alt="Barcelona" />
            <p>BARCELONA <span>SPAIN</span></p>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <img src="/BTTH2_2/images/insta.png" alt="Instagram" />
      <img src="/BTTH2_2/images/facebook.png" alt="Facebook" />
    </footer>
  </body>
</html>
